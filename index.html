<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông tin đăng ký</title>
    <!-- Link Bootstrap 3 CSS -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    
    <style>
        body { background-color: #f4f5f7; min-height:100vh; margin:0; }
        .container { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
        
        /* Container chính của form */
        .registration-card {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            max-width: 650px;
            width: 100%;
            margin: auto;
        }

        /* Header màu xanh lá */
        .header-title {
            background-color: #8db059;
            color: #000;
            padding: 16px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }

        .form-content { padding: 20px 30px; }

        /* Custom Input: Chỉ có gạch chân giống image.png */
        .custom-input {
            border: none;
            border-bottom: 1px solid #000;
            border-radius: 0;
            box-shadow: none;
            padding: 5px 0;
            width: 100%;
            background: transparent;
        }
        .custom-input:focus {
            outline: none;
            border-bottom: 2px solid #8db059;
        }

        /* Label canh trái */
        .control-label {
            text-align: left !important;
            font-size: 16px;
            font-weight: normal;
        }

        /* Textarea giữ nguyên khung */
        textarea.form-control {
            border: 1px solid #000;
            border-radius: 4px;
            resize: vertical;
        }

        /* Button group */
        .btn-group-custom {
            text-align: center;
            margin-top: 20px;
        }
        .btn-custom {
            background-color: #8db059;
            color: #000;
            border: 1px solid #444;
            padding: 8px 30px;
            font-weight: bold;
            margin: 0 10px;
        }
        .btn-custom:hover { background-color: #7a9a4d; }

        .form-group { margin-bottom: 15px; }

        .back-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 260px;
            padding: 10px 16px;
            border-radius: 12px;
            background-color: #f1f5ff;
            color: #2f4f8b;
            border: 1px solid #d3d9f3;
            text-decoration: none;
            font-size: 16px;
            transition: background-color 0.2s ease, transform 0.15s ease;
        }

        .back-btn:hover {
            background-color: #e6edff;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="registration-card">
        <div class="header-title">Thông tin đăng ký</div>
        
        <div class="form-content">
            <form id="registerForm" class="form-horizontal">
                
                <!-- Họ tên -->
                <div class="form-group">
                    <label class="col-sm-3 control-label">Họ tên:</label>
                    <div class="col-sm-9">
                        <input type="text" class="custom-input" placeholder="Nhập họ tên">
                    </div>
                </div>

                <!-- Ngày sinh -->
                <div class="form-group">
<label class="col-sm-3 control-label">Ngày sinh:</label>
                    <div class="col-sm-9">
                        <input type="date" class="custom-input">
                    </div>
                </div>

                <!-- Giới tính -->
                <div class="form-group">
                    <label class="col-sm-3 control-label">Giới tính:</label>
                    <div class="col-sm-9">
                        <label class="radio-inline"><input type="radio" name="gender"> Nam</label>
                        <label class="radio-inline"><input type="radio" name="gender"> Nữ</label>
                    </div>
                </div>

                <!-- Địa chỉ -->
                <div class="form-group">
                    <label class="col-sm-3 control-label">Địa chỉ:</label>
                    <div class="col-sm-9">
                        <input type="text" class="custom-input" placeholder="Nhập địa chỉ">
                    </div>
                </div>

                <!-- MSSV -->
                <div class="form-group">
                    <label class="col-sm-3 control-label">MSSV:</label>
                    <div class="col-sm-9">
                        <input type="text" class="custom-input" placeholder="Nhập mã số sinh viên">
                    </div>
                </div>

                <!-- Lớp -->
                <div class="form-group">
                    <label class="col-sm-3 control-label">Lớp:</label>
                    <div class="col-sm-9">
                        <select class="custom-input">
                            <option>DA22TTA</option>
                            <option>DA22TTB</option>
                            <option>DA22TTC</option>
                            <option>DA22TTD</option>
                            <option>DA24TTD</option>
                            <option>DA25TTD</option>
                        </select>
                    </div>
                </div>

                <!-- Số điện thoại -->
                <div class="form-group">
                    <label class="col-sm-3 control-label">Số điện thoại:</label>
                    <div class="col-sm-9">
                        <input type="tel" class="custom-input" placeholder="Nhập số điện thoại">
                    </div>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label class="col-sm-3 control-label">Email:</label>
                    <div class="col-sm-9">
                        <input type="email" class="custom-input" placeholder="Nhập email">
                    </div>
                </div>

                <!-- Ảnh đại diện -->
                <div class="form-group">
                    <label class="col-sm-3 control-label">Ảnh đại diện:</label>
                    <div class="col-sm-9">
<input type="file" class="custom-input">
                    </div>
                </div>

                <!-- Sở trường -->
                <div class="form-group">
                    <label class="col-sm-3 control-label">Sở trường:</label>
                    <div class="col-sm-9">
                        <label class="checkbox-inline"><input type="checkbox"> Thiết kế web</label>
                        <label class="checkbox-inline"><input type="checkbox"> Lập trình web</label>
                        <label class="checkbox-inline"><input type="checkbox"> Thành thạo tiếng Trung</label>
                    </div>
                </div>

                <!-- Mô tả sơ lược -->
                <div class="form-group">
                    <label class="col-sm-12 control-label">Mô tả sơ lược:</label>
                    <div class="col-sm-12">
                        <textarea class="form-control" rows="4"></textarea>
                    </div>
                </div>

                <!-- Vùng hiển thị kết quả -->
                <div id="registerResult" style="display:none; text-align:center; margin-bottom:12px;"></div>

                <!-- Nút bấm -->
                <div class="btn-group-custom">
                    <button type="button" class="btn btn-custom">Hủy bỏ</button>
                    <button type="submit" class="btn btn-custom">Đăng ký</button>
                </div>
                <div class="btn-group-custom" style="margin-top:12px;">
                    <a href="https://anh201583-wq.github.io/TrangBaiTap-html/" class="back-btn">← Quay lại Trang Bài Tập</a>
                </div>

            </form>
        </div>
    </div>
</div>

</body>
<script>
    (function(){
        var form = document.getElementById('registerForm');
        var result = document.getElementById('registerResult');
        if(!form) return;
        form.addEventListener('submit', function(e){
            e.preventDefault();
            result.className = 'alert alert-success';
            result.style.display = 'block';
            result.innerText = 'Đã Đăng ký thành công';
            result.scrollIntoView({behavior: 'smooth', block: 'center'});
        });
    })();
</script>
</html>
